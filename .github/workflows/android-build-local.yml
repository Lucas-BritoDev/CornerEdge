# ============================================================================
# GoalEdge - Build Local no GitHub Actions (Simplificado)
# ============================================================================
# Pipeline: Testes → Build Gradle → Upload Artifacts
#
# FUNCIONALIDADES:
# - Build 100% no GitHub Actions (sem EAS)
# - Gera AAB e APK localmente
# - Upload automático para GitHub Artifacts
# - Download direto da aba Actions
#
# CONFIGURAÇÃO NECESSÁRIA:
# - Nenhuma! Não precisa de EXPO_TOKEN
#
# Versão: 6.1.0 (Simplificado - Sem Prebuild)
# ============================================================================

name: Android Build Local

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'DOCS/**'
      - '.planning/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ==========================================================================
  # Job 1: Testes e Validação
  # ==========================================================================
  test:
    name: 🧪 Testes e Validação
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript Check
        run: |
          echo "🔍 Verificando tipos TypeScript..."
          npx tsc --noEmit
          echo "✅ TypeScript OK!"

      - name: 🎨 ESLint
        continue-on-error: true
        run: |
          echo "🎨 Executando ESLint..."
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || grep -q '"eslintConfig"' package.json; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 50
            echo "✅ Lint OK!"
          else
            echo "⚠️ ESLint não configurado, pulando..."
          fi

      - name: 🧪 Testes Unitários
        continue-on-error: true
        run: |
          echo "🧪 Executando testes..."
          npm test -- --passWithNoTests --coverage --maxWorkers=2
          echo "✅ Testes OK!"

      - name: 📊 Upload Coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ==========================================================================
  # Job 2: Build APK e AAB (Usando EAS Build)
  # ==========================================================================
  build:
    name: 🏗️ Build APK e AAB
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API: ${{ secrets.EXPO_PUBLIC_API }}
        run: |
          echo "🔨 Executando Expo Prebuild..."
          npx expo prebuild --platform android --clean --no-install
          echo "✅ Prebuild concluído!"

      - name: 🔧 Configurar Gradle Wrapper
        run: |
          echo "🔧 Configurando permissões do Gradle..."
          cd android
          chmod +x gradlew
          echo "✅ Gradle configurado!"

      - name: 🔑 Configurar Keystore
        run: |
          echo "🔑 Usando keystore existente..."
          
          # Verificar se keystore existe
          if [ -f "@luck1993__goaledge.jks" ]; then
            echo "✅ Keystore encontrada: @luck1993__goaledge.jks"
            
            # Copiar para diretório android/app
            mkdir -p android/app
            cp @luck1993__goaledge.jks android/app/
            
            echo "✅ Keystore configurada!"
          else
            echo "❌ Keystore não encontrada!"
            echo "⚠️ Criando keystore de debug temporária..."
            
            mkdir -p android/app
            cd android/app
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            
            echo "✅ Keystore de debug criada!"
          fi

      - name: 🏗️ Build APK
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API: ${{ secrets.EXPO_PUBLIC_API }}
        run: |
          echo "🏗️ Compilando APK..."
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --info
          echo "✅ APK compilado!"

      - name: 🏗️ Build AAB
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API: ${{ secrets.EXPO_PUBLIC_API }}
        run: |
          echo "🏗️ Compilando AAB..."
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace --info
          echo "✅ AAB compilado!"

      - name: 📦 Preparar Artefatos
        run: |
          echo "📦 Preparando artefatos..."
          mkdir -p artifacts
          
          # Copiar APK
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk artifacts/goaledge.apk
            echo "✅ APK copiado"
          else
            echo "❌ APK não encontrado"
          fi
          
          # Copiar AAB
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab artifacts/goaledge.aab
            echo "✅ AAB copiado"
          else
            echo "❌ AAB não encontrado"
          fi
          
          # Listar artefatos
          ls -lh artifacts/
          echo "✅ Artefatos preparados!"

      - name: 📤 Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-apk
          path: artifacts/goaledge.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-aab
          path: artifacts/goaledge.aab
          retention-days: 30
          if-no-files-found: warn

      - name: 📊 Resumo
        if: always()
        run: |
          echo "## 📦 Build Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f artifacts/goaledge.apk ]; then
            APK_SIZE=$(du -h artifacts/goaledge.apk | cut -f1)
            echo "✅ **APK:** goaledge.apk ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **APK:** Falhou" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f artifacts/goaledge.aab ]; then
            AAB_SIZE=$(du -h artifacts/goaledge.aab | cut -f1)
            echo "✅ **AAB:** goaledge.aab ($AAB_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **AAB:** Falhou" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Como baixar" >> $GITHUB_STEP_SUMMARY
          echo "1. Vá para a aba 'Actions' deste repositório" >> $GITHUB_STEP_SUMMARY
          echo "2. Clique neste workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Role até 'Artifacts'" >> $GITHUB_STEP_SUMMARY
          echo "4. Baixe 'goaledge-apk' e 'goaledge-aab'" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 3: Notificação Final
  # ==========================================================================
  notify:
    name: 📢 Notificação
    needs: [test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Resumo Final
        run: |
          echo "# 🎯 GoalEdge - Pipeline Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Status dos Jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Testes | ${{ needs.test.result == 'success' && '✅ Sucesso' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Sucesso' || needs.build.result == 'skipped' && '⏭️ Pulado' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Download dos Artefatos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Na aba Actions deste repositório:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Clique neste workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Role até a seção 'Artifacts'" >> $GITHUB_STEP_SUMMARY
          echo "3. Baixe os arquivos:" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-apk** (para instalação direta)" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-aab** (para Play Store)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artefatos Disponíveis" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** Para instalação direta em dispositivos Android" >> $GITHUB_STEP_SUMMARY
          echo "- **AAB:** Para upload na Google Play Store" >> $GITHUB_STEP_SUMMARY
          echo "- **Retenção:** 30 dias" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎉 Próximos Passos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Baixar APK e testar em dispositivo físico" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Verificar funcionalidades principais" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Baixar AAB para publicação na Play Store" >> $GITHUB_STEP_SUMMARY
          echo "4. 📚 Seguir guia: PUBLICACAO_PLAY_STORE.md" >> $GITHUB_STEP_SUMMARY
