# ============================================================================
# GoalEdge - Build Local no GitHub Actions
# ============================================================================
# Pipeline: Testes → Lint → Prebuild → Build Gradle → Upload Artifacts
#
# FUNCIONALIDADES:
# - Build 100% no GitHub Actions (sem EAS)
# - Gera AAB e APK localmente
# - Upload automático para GitHub Artifacts
# - Download direto da aba Actions
#
# CONFIGURAÇÃO NECESSÁRIA:
# - Nenhuma! Não precisa de EXPO_TOKEN
#
# Versão: 6.0.0 (Build Local)
# ============================================================================

name: Android Build Local

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'DOCS/**'
      - '.planning/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ==========================================================================
  # Job 1: Testes e Validação
  # ==========================================================================
  test:
    name: 🧪 Testes e Validação
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript Check
        run: |
          echo "🔍 Verificando tipos TypeScript..."
          npx tsc --noEmit
          echo "✅ TypeScript OK!"

      - name: 🎨 ESLint
        continue-on-error: true
        run: |
          echo "🎨 Executando ESLint..."
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || grep -q '"eslintConfig"' package.json; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 50
            echo "✅ Lint OK!"
          else
            echo "⚠️ ESLint não configurado, pulando..."
          fi

      - name: 🧪 Testes Unitários
        continue-on-error: true
        run: |
          echo "🧪 Executando testes..."
          npm test -- --passWithNoTests --coverage --maxWorkers=2
          echo "✅ Testes OK!"

      - name: 📊 Upload Coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ==========================================================================
  # Job 2: Build APK
  # ==========================================================================
  build-apk:
    name: 🏗️ Build APK
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: |
          echo "🔨 Executando Expo Prebuild..."
          npx expo prebuild --platform android --clean
          echo "✅ Prebuild concluído!"

      - name: 🔑 Criar Keystore de Debug
        run: |
          echo "🔑 Criando keystore de debug..."
          cd android/app
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Keystore criado!"

      - name: 🏗️ Build APK
        run: |
          echo "🏗️ Compilando APK..."
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "✅ APK compilado!"

      - name: 📦 Renomear APK
        run: |
          echo "📦 Renomeando APK..."
          cd android/app/build/outputs/apk/release
          mv app-release.apk goaledge.apk
          ls -lh goaledge.apk
          echo "✅ APK renomeado!"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-apk
          path: android/app/build/outputs/apk/release/goaledge.apk
          retention-days: 30

      - name: 📊 Resumo APK
        run: |
          echo "## 📦 APK Gerado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **APK compilado com sucesso!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/release
          SIZE=$(du -h goaledge.apk | cut -f1)
          echo "- **Arquivo:** goaledge.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Tamanho:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Localização:** android/app/build/outputs/apk/release/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Como baixar" >> $GITHUB_STEP_SUMMARY
          echo "1. Vá para a aba 'Actions' deste repositório" >> $GITHUB_STEP_SUMMARY
          echo "2. Clique neste workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Role até 'Artifacts'" >> $GITHUB_STEP_SUMMARY
          echo "4. Baixe 'goaledge-apk'" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 3: Build AAB
  # ==========================================================================
  build-aab:
    name: 🏗️ Build AAB
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: |
          echo "🔨 Executando Expo Prebuild..."
          npx expo prebuild --platform android --clean
          echo "✅ Prebuild concluído!"

      - name: 🔑 Criar Keystore de Debug
        run: |
          echo "🔑 Criando keystore de debug..."
          cd android/app
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Keystore criado!"

      - name: 🏗️ Build AAB
        run: |
          echo "🏗️ Compilando AAB (Android App Bundle)..."
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace
          echo "✅ AAB compilado!"

      - name: 📦 Renomear AAB
        run: |
          echo "📦 Renomeando AAB..."
          cd android/app/build/outputs/bundle/release
          mv app-release.aab goaledge.aab
          ls -lh goaledge.aab
          echo "✅ AAB renomeado!"

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-aab
          path: android/app/build/outputs/bundle/release/goaledge.aab
          retention-days: 30

      - name: 📊 Resumo AAB
        run: |
          echo "## 📦 AAB Gerado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **AAB compilado com sucesso!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/bundle/release
          SIZE=$(du -h goaledge.aab | cut -f1)
          echo "- **Arquivo:** goaledge.aab" >> $GITHUB_STEP_SUMMARY
          echo "- **Tamanho:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Localização:** android/app/build/outputs/bundle/release/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Como baixar" >> $GITHUB_STEP_SUMMARY
          echo "1. Vá para a aba 'Actions' deste repositório" >> $GITHUB_STEP_SUMMARY
          echo "2. Clique neste workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Role até 'Artifacts'" >> $GITHUB_STEP_SUMMARY
          echo "4. Baixe 'goaledge-aab'" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 4: Notificação Final
  # ==========================================================================
  notify:
    name: 📢 Notificação
    needs: [test, build-apk, build-aab]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Resumo Final
        run: |
          echo "# 🎯 GoalEdge - Build Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Status dos Jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Testes | ${{ needs.test.result == 'success' && '✅ Sucesso' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Build APK | ${{ needs.build-apk.result == 'success' && '✅ Sucesso' || needs.build-apk.result == 'skipped' && '⏭️ Pulado' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Build AAB | ${{ needs.build-aab.result == 'success' && '✅ Sucesso' || needs.build-aab.result == 'skipped' && '⏭️ Pulado' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Download dos Artefatos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Na aba Actions deste repositório:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Clique neste workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Role até a seção 'Artifacts'" >> $GITHUB_STEP_SUMMARY
          echo "3. Baixe os arquivos:" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-apk** (para instalação direta)" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-aab** (para Play Store)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artefatos Disponíveis" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** Para instalação direta em dispositivos Android" >> $GITHUB_STEP_SUMMARY
          echo "- **AAB:** Para upload na Google Play Store" >> $GITHUB_STEP_SUMMARY
          echo "- **Retenção:** 30 dias" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎉 Próximos Passos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Baixar APK e testar em dispositivo físico" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Verificar funcionalidades principais" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Baixar AAB para publicação na Play Store" >> $GITHUB_STEP_SUMMARY
          echo "4. 📚 Seguir guia: PUBLICACAO_PLAY_STORE.md" >> $GITHUB_STEP_SUMMARY
