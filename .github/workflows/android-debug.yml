# ============================================================================
# CornerEdge - Build DEBUG para Troubleshooting
# ============================================================================

name: Android Debug Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: 🐛 Build APK Debug
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API: ${{ secrets.EXPO_PUBLIC_API }}
        run: |
          npx expo prebuild --platform android --clean --no-install
          echo "✅ Prebuild concluído!"

      - name: 🔧 Configurar Gradle
        run: |
          cd android
          chmod +x gradlew
          echo "android.enableR8=false" >> gradle.properties
          echo "android.enableProguard=false" >> gradle.properties

      - name: 🐛 Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "✅ APK Debug compilado!"

      - name: 📦 Preparar Artefato
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/corneredge-debug.apk
          ls -lh artifacts/corneredge-debug.apk

      - name: 📤 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: corneredge-debug-apk
          path: artifacts/corneredge-debug.apk
          retention-days: 7

      - name: 📊 Resumo
        run: |
          echo "## 🐛 APK Debug Gerado" >> $GITHUB_STEP_SUMMARY
          SIZE=$(du -h artifacts/corneredge-debug.apk | cut -f1)
          echo "- **Arquivo:** corneredge-debug.apk ($SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "- **Logs:** \`adb logcat | grep -i corneredge\`" >> $GITHUB_STEP_SUMMARY
