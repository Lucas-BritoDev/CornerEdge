# ============================================================================
# GoalEdge - Build DEBUG para Troubleshooting
# ============================================================================
# Gera APK de debug com logs habilitados para diagnosticar crashes
# ============================================================================

name: Android Debug Build

on:
  workflow_dispatch:  # Executar manualmente

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: 🐛 Build APK Debug
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: |
          echo "🔨 Executando Expo Prebuild..."
          npx expo prebuild --platform android --clean --no-install
          echo "✅ Prebuild concluído!"

      - name: 🔧 Configurar Gradle
        run: |
          echo "🔧 Configurando Gradle..."
          cd android
          chmod +x gradlew
          
          # Desabilitar minificação para debug
          echo "android.enableR8=false" >> gradle.properties
          echo "android.enableProguard=false" >> gradle.properties
          
          echo "✅ Gradle configurado!"

      - name: 🐛 Build APK Debug
        run: |
          echo "🐛 Compilando APK Debug..."
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace --info
          echo "✅ APK Debug compilado!"

      - name: 📦 Preparar Artefato
        run: |
          echo "📦 Preparando artefato..."
          mkdir -p artifacts
          
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/goaledge-debug.apk
            ls -lh artifacts/goaledge-debug.apk
            echo "✅ APK Debug preparado!"
          else
            echo "❌ APK Debug não encontrado!"
            exit 1
          fi

      - name: 📤 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-debug-apk
          path: artifacts/goaledge-debug.apk
          retention-days: 7

      - name: 📊 Resumo
        run: |
          echo "## 🐛 APK Debug Gerado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **APK Debug compilado com sucesso!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SIZE=$(du -h artifacts/goaledge-debug.apk | cut -f1)
          echo "- **Arquivo:** goaledge-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Tamanho:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Tipo:** Debug (com logs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Como usar" >> $GITHUB_STEP_SUMMARY
          echo "1. Baixe o APK da aba Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Instale no dispositivo" >> $GITHUB_STEP_SUMMARY
          echo "3. Conecte via USB: \`adb devices\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Ver logs: \`adb logcat | grep -i goaledge\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐛 Debug" >> $GITHUB_STEP_SUMMARY
          echo "- Minificação: Desabilitada" >> $GITHUB_STEP_SUMMARY
          echo "- ProGuard: Desabilitado" >> $GITHUB_STEP_SUMMARY
          echo "- Logs: Habilitados" >> $GITHUB_STEP_SUMMARY
