# ============================================================================
# GoalEdge - CI/CD Pipeline para Android (EAS Build)
# ============================================================================
# Pipeline profissional usando EAS Build (mais confiável que Gradle local)
#
# Authores: GoalEdge Team
# Versão: 3.0.0
# ============================================================================

name: Android CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Job 1: Validação
  # ==========================================================================
  test:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npx tsc --noEmit
        continue-on-error: true

      - name: 📊 Summary
        run: |
          echo "## ✅ Validação" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: OK" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 2: Build AAB (via EAS)
  # ==========================================================================
  build-aab:
    name: 📦 Build AAB (EAS)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: 🔐 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Build AAB via EAS
        id: eas-build
        run: |
          echo "🚀 Starting EAS build for AAB..."
          
          # Start build and get ID
          BUILD_JSON=$(npx eas build --platform android --profile production --non-interactive --json 2>&1)
          echo "Build response: $BUILD_JSON"
          
          # Extract build ID
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id // empty')
          
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "❌ Failed to get build ID"
            echo "Response: $BUILD_JSON"
            exit 1
          fi
          
          echo "✅ Build started: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: ⏳ Wait for Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID="${{ steps.eas-build.outputs.build_id }}"
          MAX_ATTEMPTS=90
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            STATUS=$(npx eas build:view $BUILD_ID --json 2>/dev/null | jq -r '.[0].status' 2>/dev/null || echo "UNKNOWN")
            echo "[$((ATTEMPT * 30))s] Status: $STATUS"
            
            case $STATUS in
              FINISHED)
                echo "✅ Build finished!"
                break
                ;;
              ERRORED|FAILED)
                echo "❌ Build failed: $STATUS"
                exit 1
                ;;
             _canceled_)
                echo "❌ Build canceled"
                exit 1
                ;;
            esac
            
            sleep 30
          done
          
          if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
            echo "❌ Timeout"
            exit 1
          fi

      - name: 📥 Download AAB
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID="${{ steps.eas-build.outputs.build_id }}"
          npx eas build:download --id $BUILD_ID --output ./goaledge.aab
          
          if [ -f "./goaledge.aab" ]; then
            ls -lh goaledge.aab
          else
            echo "❌ Download failed"
            exit 1
          fi

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-aab
          path: goaledge.aab
          retention-days: 30

  # ==========================================================================
  # Job 3: Build APK (via EAS)
  # ==========================================================================
  build-apk:
    name: 📦 Build APK (EAS)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: 🔐 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Build APK via EAS
        id: eas-apk
        run: |
          echo "🚀 Starting EAS build for APK..."
          
          BUILD_JSON=$(npx eas build --platform android --profile production-apk --non-interactive --json 2>&1)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id // empty')
          
          if [ -z "$BUILD_ID" ]; then
            echo "❌ Failed to get build ID"
            exit 1
          fi
          
          echo "✅ APK Build started: $BUILD_ID"
          echo "apk_build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: ⏳ Wait for APK Build
        run: |
          BUILD_ID="${{ steps.eas-apk.outputs.apk_build_id }}"
          MAX_ATTEMPTS=90
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(npx eas build:view $BUILD_ID --json 2>/dev/null | jq -r '.[0].status' 2>/dev/null || echo "UNKNOWN")
            echo "[$((ATTEMPT * 30))s] Status: $STATUS"
            
            case $STATUS in
              FINISHED) echo "✅ APK Built!"; break ;;
              ERRORED|FAILED|_canceled_) echo "❌ Failed: $STATUS"; exit 1 ;;
            esac
            sleep 30
          done

      - name: 📥 Download APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID="${{ steps.eas-apk.outputs.apk_build_id }}"
          npx eas build:download --id $BUILD_ID --output ./goaledge.apk
          
          if [ -f "./goaledge.apk" ]; then
            ls -lh goaledge.apk
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-apk
          path: goaledge.apk
          retention-days: 30