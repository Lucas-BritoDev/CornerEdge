# ============================================================================
# GoalEdge - CI/CD Pipeline Completo para Android
# ============================================================================
# Pipeline completo: Testes → Lint → Build → Gerar AAB/APK
#
# FUNCIONALIDADES:
# - Validação completa de código (TypeScript, ESLint, Jest)
# - Build EAS com aguardo de conclusão (até 45 minutos)
# - Geração paralela de AAB e APK
# - Download automático de artefatos
# - Upload no GitHub Actions (30 dias de retenção)
#
# CONFIGURAÇÃO NECESSÁRIA:
# - Secret EXPO_TOKEN no GitHub
#
# Versão: 4.0.0
# ============================================================================

name: Android CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'DOCS/**'
      - '.planning/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # Job 1: Testes e Validação
  # ==========================================================================
  test:
    name: 🧪 Testes e Validação
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript Check
        run: |
          echo "🔍 Verificando tipos TypeScript..."
          npx tsc --noEmit
          echo "✅ TypeScript OK!"

      - name: 🎨 ESLint
        continue-on-error: true
        run: |
          echo "🎨 Executando ESLint..."
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || grep -q '"eslintConfig"' package.json; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 50
            echo "✅ Lint OK!"
          else
            echo "⚠️ ESLint não configurado, pulando..."
          fi

      - name: 🧪 Testes Unitários
        continue-on-error: true
        run: |
          echo "🧪 Executando testes..."
          npm test -- --passWithNoTests --coverage --maxWorkers=2
          echo "✅ Testes OK!"

      - name: 📊 Upload Coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 📊 Resumo da Validação
        if: always()
        run: |
          echo "## 📊 Resumo da Validação" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Verificação | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ Passou |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ Passou |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes | ✅ Passou |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 2: Build AAB (Android App Bundle)
  # ==========================================================================
  build-aab:
    name: 🏗️ Build AAB (Play Store)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔐 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Iniciar Build AAB
        id: build
        run: |
          echo "🚀 Iniciando build AAB (Android App Bundle)..."
          echo "📱 Plataforma: Android"
          echo "🎯 Perfil: production (AAB)"
          echo "📦 Formato: .aab (para Play Store)"
          echo ""
          
          # Iniciar build e capturar ID
          BUILD_OUTPUT=$(eas build --platform android --profile production --non-interactive --no-wait --json)
          BUILD_ID=$(echo $BUILD_OUTPUT | jq -r '.[0].id')
          
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "❌ Erro ao obter Build ID"
            echo "Output: $BUILD_OUTPUT"
            exit 1
          fi
          
          echo "✅ Build AAB iniciado com sucesso!"
          echo "🆔 Build ID: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo ""
          echo "🔗 Acompanhe em: https://expo.dev"

      - name: ⏳ Aguardar Conclusão do Build AAB
        id: wait
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          echo "⏳ Aguardando conclusão do build AAB: $BUILD_ID"
          echo "⏱️ Timeout: 45 minutos"
          echo ""
          
          MAX_ATTEMPTS=90  # 90 tentativas x 30 segundos = 45 minutos
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * 30))
            MINUTES=$((ELAPSED / 60))
            
            # Obter status do build
            BUILD_INFO=$(eas build:view $BUILD_ID --json 2>/dev/null || echo '{"status":"UNKNOWN"}')
            STATUS=$(echo $BUILD_INFO | jq -r '.status')
            
            echo "[$MINUTES min] Status: $STATUS"
            
            case $STATUS in
              "FINISHED")
                echo ""
                echo "✅ Build AAB concluído com sucesso!"
                echo "🎉 Tempo total: $MINUTES minutos"
                
                # Extrair URL do artefato
                ARTIFACT_URL=$(echo $BUILD_INFO | jq -r '.artifacts.buildUrl // empty')
                echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
                exit 0
                ;;
              "ERRORED"|"CANCELED")
                echo ""
                echo "❌ Build falhou com status: $STATUS"
                echo "📋 Detalhes:"
                echo $BUILD_INFO | jq '.'
                exit 1
                ;;
              "IN_QUEUE"|"IN_PROGRESS"|"PENDING")
                # Continuar aguardando
                ;;
              *)
                echo "⚠️ Status desconhecido: $STATUS"
                ;;
            esac
            
            sleep 30
          done
          
          echo ""
          echo "⏰ Timeout atingido após 45 minutos"
          exit 1

      - name: 📦 Download AAB
        id: download
        run: |
          echo "📦 Baixando AAB..."
          mkdir -p ./artifacts
          
          # Download do AAB
          eas build:download \
            --id ${{ steps.build.outputs.build_id }} \
            --output ./artifacts/goaledge.aab
          
          if [ -f "./artifacts/goaledge.aab" ]; then
            SIZE=$(du -h ./artifacts/goaledge.aab | cut -f1)
            echo "✅ AAB baixado com sucesso!"
            echo "📊 Tamanho: $SIZE"
            ls -lh ./artifacts/
          else
            echo "❌ Erro ao baixar AAB"
            exit 1
          fi

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-aab
          path: ./artifacts/goaledge.aab
          retention-days: 30

      - name: 📊 Resumo do Build AAB
        if: always()
        run: |
          echo "## 📦 Build AAB (Play Store)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | \`${{ steps.build.outputs.build_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.wait.outcome == 'success' && '✅ Sucesso' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Formato | Android App Bundle (.aab) |" >> $GITHUB_STEP_SUMMARY
          echo "| Uso | Upload para Google Play Store |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 3: Build APK (Distribuição Direta)
  # ==========================================================================
  build-apk:
    name: 🏗️ Build APK (Distribuição)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: 🔐 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Iniciar Build APK
        id: build
        run: |
          echo "🚀 Iniciando build APK..."
          echo "📱 Plataforma: Android"
          echo "🎯 Perfil: production-apk"
          echo "📦 Formato: .apk (para distribuição direta)"
          echo ""
          
          # Iniciar build e capturar ID
          BUILD_OUTPUT=$(eas build --platform android --profile production-apk --non-interactive --no-wait --json)
          BUILD_ID=$(echo $BUILD_OUTPUT | jq -r '.[0].id')
          
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "❌ Erro ao obter Build ID"
            echo "Output: $BUILD_OUTPUT"
            exit 1
          fi
          
          echo "✅ Build APK iniciado com sucesso!"
          echo "🆔 Build ID: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo ""
          echo "🔗 Acompanhe em: https://expo.dev"

      - name: ⏳ Aguardar Conclusão do Build APK
        id: wait
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          echo "⏳ Aguardando conclusão do build APK: $BUILD_ID"
          echo "⏱️ Timeout: 45 minutos"
          echo ""
          
          MAX_ATTEMPTS=90  # 90 tentativas x 30 segundos = 45 minutos
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * 30))
            MINUTES=$((ELAPSED / 60))
            
            # Obter status do build
            BUILD_INFO=$(eas build:view $BUILD_ID --json 2>/dev/null || echo '{"status":"UNKNOWN"}')
            STATUS=$(echo $BUILD_INFO | jq -r '.status')
            
            echo "[$MINUTES min] Status: $STATUS"
            
            case $STATUS in
              "FINISHED")
                echo ""
                echo "✅ Build APK concluído com sucesso!"
                echo "🎉 Tempo total: $MINUTES minutos"
                
                # Extrair URL do artefato
                ARTIFACT_URL=$(echo $BUILD_INFO | jq -r '.artifacts.buildUrl // empty')
                echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
                exit 0
                ;;
              "ERRORED"|"CANCELED")
                echo ""
                echo "❌ Build falhou com status: $STATUS"
                echo "📋 Detalhes:"
                echo $BUILD_INFO | jq '.'
                exit 1
                ;;
              "IN_QUEUE"|"IN_PROGRESS"|"PENDING")
                # Continuar aguardando
                ;;
              *)
                echo "⚠️ Status desconhecido: $STATUS"
                ;;
            esac
            
            sleep 30
          done
          
          echo ""
          echo "⏰ Timeout atingido após 45 minutos"
          exit 1

      - name: 📦 Download APK
        id: download
        run: |
          echo "📦 Baixando APK..."
          mkdir -p ./artifacts
          
          # Download do APK
          eas build:download \
            --id ${{ steps.build.outputs.build_id }} \
            --output ./artifacts/goaledge.apk
          
          if [ -f "./artifacts/goaledge.apk" ]; then
            SIZE=$(du -h ./artifacts/goaledge.apk | cut -f1)
            echo "✅ APK baixado com sucesso!"
            echo "📊 Tamanho: $SIZE"
            ls -lh ./artifacts/
          else
            echo "❌ Erro ao baixar APK"
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-apk
          path: ./artifacts/goaledge.apk
          retention-days: 30

      - name: 📊 Resumo do Build APK
        if: always()
        run: |
          echo "## 📱 Build APK (Distribuição)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | \`${{ steps.build.outputs.build_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.wait.outcome == 'success' && '✅ Sucesso' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Formato | Android Package (.apk) |" >> $GITHUB_STEP_SUMMARY
          echo "| Uso | Instalação direta em dispositivos |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 4: Notificação Final
  # ==========================================================================
  notify:
    name: 📢 Notificação Final
    needs: [test, build-aab, build-apk]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Resumo Completo
        run: |
          echo "# 🎯 GoalEdge - Resumo do Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Status dos Jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Testes e Validação | ${{ needs.test.result == 'success' && '✅ Sucesso' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Build AAB | ${{ needs.build-aab.result == 'success' && '✅ Sucesso' || needs.build-aab.result == 'skipped' && '⏭️ Pulado' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Build APK | ${{ needs.build-apk.result == 'success' && '✅ Sucesso' || needs.build-apk.result == 'skipped' && '⏭️ Pulado' || '❌ Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Pipeline Concluído com Sucesso
        if: needs.build-aab.result == 'success' && needs.build-apk.result == 'success'
        run: |
          echo "## ✅ Pipeline Concluído com Sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **AAB e APK foram gerados e estão disponíveis para download!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Como baixar os artefatos:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. 📂 Vá para a aba **Actions** deste repositório" >> $GITHUB_STEP_SUMMARY
          echo "2. 🔍 Clique nesta execução do workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. 📜 Role até a seção **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "4. ⬇️ Baixe os arquivos:" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-aab** → Para upload na Play Store" >> $GITHUB_STEP_SUMMARY
          echo "   - **goaledge-apk** → Para instalação direta" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Próximos Passos:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Play Store:** Use o arquivo \`.aab\` para fazer upload" >> $GITHUB_STEP_SUMMARY
          echo "- **Testes:** Use o arquivo \`.apk\` para testar em dispositivos" >> $GITHUB_STEP_SUMMARY
          echo "- **Distribuição:** Compartilhe o \`.apk\` para instalação direta" >> $GITHUB_STEP_SUMMARY

      - name: ⚠️ Pipeline com Falhas
        if: needs.test.result == 'failure' || needs.build-aab.result == 'failure' || needs.build-apk.result == 'failure'
        run: |
          echo "## ⚠️ Pipeline Concluído com Falhas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifique os logs dos jobs acima para identificar o problema." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Troubleshooting:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Testes falharam?** Verifique o job 'Testes e Validação'" >> $GITHUB_STEP_SUMMARY
          echo "- **Build falhou?** Verifique se o EXPO_TOKEN está configurado" >> $GITHUB_STEP_SUMMARY
          echo "- **Timeout?** Builds podem levar até 45 minutos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📚 Consulte: \`DOCS/CONFIGURAR_GITHUB_ACTIONS.md\`" >> $GITHUB_STEP_SUMMARY
