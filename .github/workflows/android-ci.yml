# ============================================================================
# GoalEdge - CI/CD Pipeline para Android (Expo + EAS Build)
# ============================================================================
# Pipeline simplificado para build automático via EAS
#
# FUNCIONALIDADES:
# - Validação de código (TypeScript, Lint, Testes)
# - Build EAS automático (APK + AAB)
# - Upload de artefatos
#
# CONFIGURAÇÃO NECESSÁRIA:
# - Secret EXPO_TOKEN no GitHub
#
# Versão: 2.0.0
# ============================================================================

name: Android CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # Job 1: Validação de Código
  # ==========================================================================
  validate:
    name: Validar Código
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint (se disponível)
        continue-on-error: true
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint
          fi

      - name: Testes (se disponível)
        continue-on-error: true
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --passWithNoTests
          fi

  # ==========================================================================
  # Job 2: Build EAS
  # ==========================================================================
  build:
    name: Build Android (EAS)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK + AAB
        run: |
          echo "🚀 Iniciando build de produção..."
          eas build --platform android --profile production --non-interactive --no-wait
          
          echo "✅ Build iniciado com sucesso!"
          echo "📦 O build será processado nos servidores do EAS"
          echo "⏱️ Tempo estimado: 15-25 minutos"
          echo ""
          echo "Para acompanhar o progresso:"
          echo "1. Acesse: https://expo.dev"
          echo "2. Vá para 'Builds'"
          echo "3. Aguarde conclusão"
          echo ""
          echo "Para baixar quando pronto:"
          echo "eas build:download --platform android --latest"

      - name: Informações do Build
        run: |
          echo "📊 Últimos builds:"
          eas build:list --platform android --limit 3