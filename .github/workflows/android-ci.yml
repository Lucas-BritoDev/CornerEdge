# ============================================================================
# GoalEdge - CI/CD Pipeline para Android (Expo + EAS Build)
# ============================================================================
# Pipeline profissional de CI/CD para automatizar build, teste e deploy do aplicativo.
# Detecta automaticamente se é Expo Managed ou React Native CLI.
#
# FUNCIONALIDADES:
# - Instalação automática de dependências
# - Cache inteligente (node_modules, Gradle)
# - Testes automatizados (Jest)
# - Lint (ESLint)
# - TypeScript check
# - Build EAS para Android (APK + AAB)
# - Upload automático de artefatos
# - Suporte a monorepo
#
# TRIGGERS:
# - Push para main/develop
# - Pull Requests
# - Tags de release
#
# CONFIGURAÇÃO NECESSÁRIA:
# - Secrets do GitHub (veja documentação)
# -Para deploy automático: EXPO_TOKEN, ANDROID_SIGNING_KEY
#
# Authores: GoalEdge Team
# Versão: 1.0.0
# ============================================================================

name: Android CI/CD

# -----------------------------------------------------------------------------
# Gatilhos (Triggers)
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/local-*.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'development'
          - 'preview'

# -----------------------------------------------------------------------------
# Permissões
# -----------------------------------------------------------------------------
permissions:
  contents: read
  id-token: write  # Necessário para upload de artefatos

# -----------------------------------------------------------------------------
# Variáveis de ambiente
# -----------------------------------------------------------------------------
env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  EXPO_VERSION: '~54.0.0'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

# -----------------------------------------------------------------------------
# Jobs
# -----------------------------------------------------------------------------
jobs:
  # ==========================================================================
  # Job 1: Detecção de tipo de projeto
  # ==========================================================================
  detect-project:
    name: Detectar Tipo de Projeto
    runs-on: ubuntu-latest
    outputs:
      project_type: ${{ steps.detect.outputs.project_type }}
      has_eas: ${{ steps.detect.outputs.has_eas }}
      build_system: ${{ steps.detect.outputs.build_system }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Detectar tipo de projeto
        id: detect
        run: |
          # Detecta tipo de projeto automaticamente
          if [ -f "app.json" ] && grep -q '"expo"' app.json; then
            PROJECT_TYPE="expo"
            if grep -q '"name":.*eas"' package.json; then
              PROJECT_TYPE="expo-eas"
            fi
          elif [ -f "android/build.gradle" ]; then
            PROJECT_TYPE="react-native-cli"
          else
            PROJECT_TYPE="unknown"
          fi
          
          # Verifica se tem EAS
          if grep -q 'eas' package.json 2>/dev/null; then
            HAS_EAS="true"
          else
            HAS_EAS="false"
          fi
          
          # Define build system
          if [ "$PROJECT_TYPE" = "expo-eas" ] || [ "$PROJECT_TYPE" = "expo" ]; then
            BUILD_SYSTEM="eas"
          else
            BUILD_SYSTEM="gradle"
          fi
          
          echo "project_type=$PROJECT_TYPE" >> $GITHUB_OUTPUT
          echo "has_eas=$HAS_EAS" >> $GITHUB_OUTPUT
          echo "build_system=$BUILD_SYSTEM" >> $GITHUB_OUTPUT
          
          echo "::notice::Tipo de projeto detectado: $PROJECT_TYPE"

  # ==========================================================================
  # Job 2: Instalação e Cache
  # ==========================================================================
  setup:
    name: Configurar Ambiente
    needs: detect-project
    runs-on: ubuntu-latest
    outputs:
      has_eas: ${{ needs.detect-project.outputs.has_eas }}
      build_system: ${{ needs.detect-project.outputs.build_system }}
      project_type: ${{ needs.detect-project.outputs.project_type }}
    steps:
      # Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Cache node_modules
      - name: Cache de dependências (npm)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Instalar dependências
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      # Setup Expo CLI
      - name: Instalar Expo CLI
        if: needs.detect-project.outputs.project_type == 'expo' || needs.detect-project.outputs.project_type == 'expo-eas'
        run: npm install -g expo@${{ env.EXPO_VERSION }}

      # Setup Java JDK
      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        if: needs.detect-project.outputs.build_system == 'gradle'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # Setup Android SDK
      - name: Setup Android SDK
        if: needs.detect-project.outputs.build_system == 'gradle'
        uses: android-actions/setup-android-sdk@v2

      # Cache Gradle
      - name: Cache Gradle
        if: needs.detect-project.outputs.build_system == 'gradle'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

  # ==========================================================================
  # Job 3: Validação (Lint + TypeScript + Testes)
  # ==========================================================================
  validate:
    name: Validar Código
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Restore cache
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      # TypeScript Check
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      # ESLint (se disponível)
      - name: Executar Lint
        if: hashFiles('.eslintrc.*') != ''
        run: |
          if [ -f "package.json" ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "::warning::Lint não configurado"
          fi

      # Testes Jest
      - name: Executar Testes
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --passWithNoTests
          else
            echo "::warning::Testes não configurados"
          fi

  # ==========================================================================
  # Job 4: Build (APK/AAB)
  # ==========================================================================
  build:
    name: Build Android
    needs: [detect-project, setup, validate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Restore cache
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      # ==========================================
      # MODO EXPO/EAS BUILD
      # ==========================================
      - name: Setup Expo
        if: needs.detect-project.outputs.has_eas == 'true'
        run: npm install -g eas-cli

      - name: Login no Expo
        if: needs.detect-project.outputs.has_eas == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            eas login --token $EXPO_TOKEN
          else
            echo "::error::EXPO_TOKEN não configurado. Configure em Settings > Secrets > Actions"
            exit 1
          fi

      # Build EAS Production (APK + AAB)
      - name: Build EAS Production
        if: needs.detect-project.outputs.has_eas == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "🚀 Iniciando build de produção..."
          eas build --platform android --profile production --non-interactive --no-wait
          
          echo "⏳ Aguardando conclusão do build..."
          sleep 30
          
          # Aguardar build finalizar
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"
          
          # Aguardar até 30 minutos
          for i in {1..60}; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Status do build ($i/60): $STATUS"
            
            if [ "$STATUS" = "FINISHED" ]; then
              echo "✅ Build concluído com sucesso!"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Build falhou com status: $STATUS"
              exit 1
            fi
            
            sleep 30
          done
          
          # Download do artefato
          echo "📦 Baixando artefatos..."
          eas build:download --platform android --latest --output ./build-output

      # Upload APK/AAB
      - name: Upload Build Artifacts
        if: needs.detect-project.outputs.has_eas == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: goaledge-android-builds
          path: |
            build-output/**/*.apk
            build-output/**/*.aab
          retention-days: 30

  # ==========================================================================
  # Job 5: Notificação de Sucesso (Opcional)
  # ==========================================================================
  notify:
    name: Notificar
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notificar sucesso
        if: needs.build.result == 'success'
        run: echo "::notice::Build concluído com sucesso!"

      - name: Notificar falha
        if: needs.build.result == 'failure'
        run: echo "::error::Build falhou!"